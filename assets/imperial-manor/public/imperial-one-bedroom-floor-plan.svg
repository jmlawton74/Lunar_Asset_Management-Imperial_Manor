      .wall{stroke:#32124f;stroke-width:13;stroke-linecap:square;stroke-linejoin:miter;fill:none}
      .inner{stroke:#32124f;stroke-width:7;stroke-linecap:square;stroke-linejoin:miter;fill:none}
      .door{stroke:#6f4a8e;stroke-width:5;stroke-linecap:round;fill:none}
      .window{stroke:#77a8c6;stroke-width:11;stroke-linecap:round}
