<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" role="img" aria-labelledby="title desc">
  <title id="title">Generic one-bedroom apartment floor plan</title>
  <desc id="desc">A generic one-bedroom apartment floor plan with a labeled front door, entry, kitchen, bath, hall, bedroom, living and dining area, windows, closets, and balcony.</desc>
  <defs>
    <style>
